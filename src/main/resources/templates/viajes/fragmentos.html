<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<!-- ===================== TABLA DE VIAJES ===================== -->
<section th:fragment="tablaViajes" class="container py-4">

    <div class="card shadow">

        <!-- ENCABEZADO -->
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h4 class="mb-0">Gestión de Viajes</h4>

            <!-- Botón abrir modal -->
            <button class="btn btn-success btn-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#modalViaje">
                + Nuevo Viaje
            </button>

        </div>

        <!-- CUERPO TABLA -->
        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Empresa</th>
                        <th>Conductor</th>
                        <th>Origen</th>
                        <th>Destino</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="v : ${viajes}">

                        <td th:text="${v.idViaje}"></td>

                        <td th:text="${v.fechaProgramada}"></td>

                        <td th:text="${v.horaProgramada}"></td>

                        <td th:text="${v.empresa.nombre}"></td>

                        <td th:text="${v.conductor.nombre}"></td>

                        <td th:text="${v.origen.nombre}"></td>

                        <td th:text="${v.destino.nombre}"></td>

                        <td th:text="${v.estadoViaje.nombreEstado}"></td>

                        <td class="text-center">

                            <!-- EDITAR -->
                            <a class="btn btn-warning btn-sm"
                               th:href="@{/viaje/modificar/{id}(id=${v.idViaje})}">
                                Editar
                            </a>

                            <!-- ELIMINAR -->
                            <form th:action="@{/viaje/eliminar}" method="post" class="d-inline">
                                <input type="hidden" name="idViaje" th:value="${v.idViaje}"/>

                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('¿Eliminar este viaje?')">
                                    Eliminar
                                </button>
                            </form>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</section>
<!-- ===================== MODAL CREAR VIAJE ===================== -->
<div class="modal fade" id="modalViaje" tabindex="-1" aria-hidden="true">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Registrar Viaje</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <!-- FORMULARIO -->
            <form th:action="@{/viaje/guardar}" method="post">

                <div class="modal-body">

                    <!-- FECHA -->
                    <div class="mb-3">
                        <label class="form-label">Fecha programada</label>
                        <input type="date" name="fechaProgramada" class="form-control" required>
                    </div>

                    <!-- HORA -->
                    <div class="mb-3">
                        <label class="form-label">Hora programada</label>
                        <input type="time" name="horaProgramada" class="form-control" required>
                    </div>

                    <!-- PASAJEROS -->
                    <div class="mb-3">
                        <label class="form-label">Cantidad de pasajeros</label>
                        <input type="number" name="cantidadPasajeros"
                               class="form-control" min="1" value="1" required>
                    </div>

                    <!-- EMPRESA -->
                    <div class="mb-3">
                        <label class="form-label">Empresa</label>
                        <select name="empresa" class="form-select" required>
                            <option value="">Seleccione</option>
                            <option th:each="e : ${empresas}"
                                    th:value="${e.idEmpresa}"
                                    th:text="${e.nombre}">
                            </option>
                        </select>
                    </div>

                    <!-- CONDUCTOR -->
                    <div class="mb-3">
                        <label class="form-label">Conductor</label>
                        <select name="conductor" class="form-select" required>
                            <option value="">Seleccione</option>
                            <option th:each="c : ${conductores}"
                                    th:value="${c.idConductor}"
                                    th:text="${c.nombre}">
                            </option>
                        </select>
                    </div>

                    <!-- ORIGEN -->
                    <div class="mb-3">
                        <label class="form-label">Origen</label>
                        <select name="origen" class="form-select" required>
                            <option value="">Seleccione</option>
                            <option th:each="u : ${ubicaciones}"
                                    th:value="${u.idUbicacion}"
                                    th:text="${u.nombre}">
                            </option>
                        </select>
                    </div>

                    <!-- DESTINO -->
                    <div class="mb-3">
                        <label class="form-label">Destino</label>
                        <select name="destino" class="form-select" required>
                            <option value="">Seleccione</option>
                            <option th:each="u : ${ubicaciones}"
                                    th:value="${u.idUbicacion}"
                                    th:text="${u.nombre}">
                            </option>
                        </select>
                    </div>

                    <!-- ESTADO -->
                    <div class="mb-3">
                        <label class="form-label">Estado del viaje</label>
                        <select name="estadoViaje" class="form-select" required>
                            <option value="">Seleccione</option>
                            <option th:each="e : ${estados}"
                                    th:value="${e.idEstadoViaje}"
                                    th:text="${e.nombreEstado}">
                            </option>
                        </select>
                    </div>

                    <!-- OBSERVACIONES -->
                    <div class="mb-3">
                        <label class="form-label">Observaciones</label>
                        <textarea name="observaciones"
                                  class="form-control"
                                  maxlength="500"></textarea>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button type="submit" class="btn btn-primary">
                        Guardar viaje
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>
