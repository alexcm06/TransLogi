<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <!-- TÍTULO -->
    <section th:fragment="titulo">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2 class="fw-bold mb-1">
                <i class="bi bi-person-badge-fill text-primary"></i>
                Conductores
                </h2>

                <p class="page-subtitle">
                    Gestión de conductores del sistema
                </p>

            </div>

            <button class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#modalAgregarConductor">

                <i class="bi bi-plus-circle me-2"></i>
                Nuevo Conductor

            </button>

        </div>

    </section>

    <!-- TABLA -->
    <section th:fragment="tablaConductores">

        <div class="card shadow-sm">

            <div class="card-header d-flex justify-content-between align-items-center">

                <h4 class="mb-0">Conductores</h4>

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-light">

                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th>Licencia</th>
                                <th>Vence</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="c : ${conductores}">

                                <td th:text="${c.idConductor}"></td>

                                <td th:text="${c.nombre}"></td>

                                <td th:text="${c.telefono}"></td>

                                <td th:text="${c.numeroLicencia}"></td>

                                <td th:text="${c.fechaVencimientoLicencia}"></td>

                                <td>

                                    <span class="badge"
                                          th:classappend="${c.activo} ? ' bg-success' : ' bg-danger'"
                                          th:text="${c.activo} ? 'Activo' : 'Inactivo'">
                                    </span>

                                </td>

                                <td class="text-center">

                                    <a th:href="@{/conductor/modificar/{id}(id=${c.idConductor})}"
                                       class="btn btn-warning btn-sm">

                                        <i class="bi bi-pencil-square"></i>

                                    </a>

                                    <button
                                        class="btn btn-danger btn-sm btnEliminar"
                                        th:data-id="${c.idConductor}"
                                        th:data-nombre="${c.nombre}"
                                        data-bs-toggle="modal"
                                        data-bs-target="#modalEliminarConductor">

                                        <i class="bi bi-trash"></i>

                                    </button>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </section>

    <!-- MODAL ELIMINAR -->
    <div th:fragment="modalEliminar"
         class="modal fade"
         id="modalEliminarConductor"
         tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header bg-danger text-white">

                    <h5 class="modal-title">

                        <i class="bi bi-exclamation-triangle-fill"></i>

                        Confirmar eliminación

                    </h5>

                    <button class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>

                </div>

                <form th:action="@{/conductor/eliminar}"
                      method="post">

                    <div class="modal-body">

                        <input type="hidden"
                               id="idConductorEliminar"
                               name="idConductor">

                        <p class="mb-0">

                            ¿Deseas eliminar el conductor

                            <strong id="nombreConductor"></strong>?

                        </p>

                        <small class="text-danger">

                            Esta acción no se puede deshacer.

                        </small>

                    </div>

                    <div class="modal-footer">

                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                            Cancelar

                        </button>

                        <button
                            class="btn btn-danger"
                            type="submit">

                            <i class="bi bi-trash"></i>

                            Eliminar

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>
    <!-- MODAL AGREGAR CONDUCTOR -->
    <div class="modal fade"
         id="modalAgregarConductor"
         tabindex="-1"
         aria-hidden="true"
         th:fragment="modalAgregar">

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <form th:action="@{/conductor/guardar}"
                      method="post"
                      th:object="${conductor}">

                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="bi bi-person-plus-fill me-2"></i>
                            Nuevo conductor
                        </h5>

                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="modal">
                        </button>
                    </div>

                    <div class="modal-body">

                        <!-- Para que Spring sepa que es un registro nuevo -->
                        <input type="hidden" th:field="*{idConductor}">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre completo</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{nombre}"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{telefono}"
                                       required>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Número de licencia</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{numeroLicencia}"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Fecha de vencimiento
                                </label>

                                <input type="date"
                                       class="form-control"
                                       th:field="*{fechaVencimientoLicencia}"
                                       required>
                            </div>

                        </div>

                    </div>

                    <div class="modal-footer">

                        <button type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            Cancelar
                        </button>

                        <button type="submit"
                                class="btn btn-primary">
                            <i class="bi bi-check-circle-fill me-1"></i>
                            Guardar conductor
                        </button>

                    </div>

                </form>
            </div>
        </div>
    </div>

</html>
