<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <aside th:replace="~{general/fragmentos :: sidebar}"></aside>

        <main class="main-content">

            <div class="container-fluid">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <div>
                        <h2 class="page-title">Modificar Conductor</h2>
                        <p class="page-subtitle">
                            Actualice la información del conductor.
                        </p>
                    </div>

                    <a th:href="@{/conductor/listado}"
                       class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i>
                        Volver
                    </a>

                </div>

                <div class="card shadow-sm">

                    <div class="card-body">

                        <form th:action="@{/conductor/guardar}"
                              method="post"
                              enctype="multipart/form-data"
                              th:object="${conductor}">

                            <input type="hidden"
                                   th:field="*{idConductor}">
                            
                            <input type="hidden"
                                    th:field="*{fotoLicencia}">
                            
                            <div class="row">

                                <div class="col-12 text-center mb-4">

                                    <label class="form-label fw-bold">
                                        Licencia actual
                                    </label>

                                    <div>

                                        <img th:if="${conductor.fotoLicencia != null}"
                                             th:src="@{'/licencias/' + ${conductor.fotoLicencia}}"
                                             class="img-thumbnail"
                                             style="max-width:350px;">

                                        <p th:unless="${conductor.fotoLicencia != null}"
                                           class="text-muted">

                                            Este conductor no tiene una licencia registrada.

                                        </p>

                                    </div>

                                </div>

                            </div>

                            <div class="row">

                                <div class="col-12 mb-4">

                                    <label class="form-label">

                                        Reemplazar fotografía de la licencia

                                    </label>

                                    <input type="file"
                                           class="form-control"
                                           id="imagenLicencia"
                                           name="imagen"
                                           accept=".jpg,.jpeg,.png">

                                    <small class="text-muted">

                                        Si no selecciona una imagen nueva,
                                        se conservará la actual.

                                    </small>

                                </div>

                            <div class="text-center">

                                <img id="previewLicencia"
                                     class="img-thumbnail"
                                     style="max-width:350px; display:none;">

                            </div>
                                
                                </div>
                            
                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Nombre
                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           th:field="*{nombre}"
                                           required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Teléfono
                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           th:field="*{telefono}"
                                           required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Número de Licencia
                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           th:field="*{numeroLicencia}"
                                           required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Vencimiento Licencia
                                    </label>

                                    <input type="date"
                                           class="form-control"
                                           th:field="*{fechaVencimientoLicencia}"
                                           required>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <label class="form-label">
                                        Estado
                                    </label>

                                    <select class="form-select"
                                            th:field="*{activo}">

                                        <option th:value="true">
                                            Activo
                                        </option>

                                        <option th:value="false">
                                            Inactivo
                                        </option>

                                    </select>

                                </div>

                            </div>

                            <div class="text-end">

                                <a th:href="@{/conductor/listado}"
                                   class="btn btn-secondary">

                                    Cancelar

                                </a>

                                <button type="submit"
                                        class="btn btn-primary">

                                    <i class="bi bi-check-lg"></i>
                                    Guardar cambios

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

        <div th:replace="~{general/fragmentos :: scripts}"></div>

        <script>

document.addEventListener("DOMContentLoaded", function () {

    const input = document.getElementById("imagenLicencia");
    const preview = document.getElementById("previewLicencia");

    if (!input || !preview) {
        return;
    }

    input.addEventListener("change", function () {

        const archivo = this.files[0];

        if (!archivo) {
            preview.style.display = "none";
            preview.src = "";
            return;
        }

        preview.src = URL.createObjectURL(archivo);
        preview.style.display = "block";

    });

});

        </script>

    </body>

</html>
