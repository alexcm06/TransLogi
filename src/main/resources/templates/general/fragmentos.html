<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <!-- HEAD -->
    <head th:fragment="head">

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>TransLogi</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
              rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
              rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}"/>

    </head>


    <!-- SIDEBAR -->
    <aside th:fragment="sidebar" class="sidebar">

        <div class="logo">

            <h3>
                <i class="bi bi-truck"></i>
                TransLogi
            </h3>

            <p>Sistema de Gestión</p>

        </div>

        <nav class="sidebar-menu">

            <a th:href="@{/}">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

            <a th:href="@{/viaje/listado}">
                <i class="bi bi-truck"></i>
                Viajes
            </a>

            <a th:href="@{/conductor/listado}">
                <i class="bi bi-person-badge"></i>
                Conductores
            </a>

            <a th:href="@{/empresa/listado}">
                <i class="bi bi-buildings"></i>
                Empresas
            </a>

            <a th:href="@{/ubicacion/listado}">
                <i class="bi bi-geo-alt"></i>
                Ubicaciones
            </a>

            <a th:href="@{/usuario/listado}">
                <i class="bi bi-people"></i>
                Usuarios
            </a>

        </nav>

        <div class="sidebar-footer">

            <hr class="text-secondary">
            <ul class="navbar-nav" sec:authorize="isAuthenticated()">
                <li class="nav-item my-auto">
                    <a class="nav-link">
                        <img th:src="@{${session.imagenUsuario}}"
                             alt="your image" height="40" class="round-circle"/>
                        <span sec:authentication="name" class="ms-1"></span>
                    </a>
                </li>

                <li class="nav-item my-auto">
                    <form method="POST" th:action="@{/logout}" style="margin-bottom: 15px; padding: 0 10px;">
                        <button type="submit" class="btn btn-danger btn-sm w-100" style="border-radius: 5px;">
                            <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
                        </button>
                    </form>
                </li>
            </ul>


            <hr class="text-secondary">

            <small>
                Grupo 3 - Equipo TransLogi
            </small>

        </div>

    </aside>


    <!-- FOOTER -->
    <footer th:fragment="scripts">

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/viaje.js}"></script>
        <script th:src="@{/js/conductor.js}"></script>
        <script th:src="@{/js/empresa.js}"></script>
        <script th:src="@{/js/ubicacion.js}"></script>
        <script th:src="@{/js/usuario.js}"></script>
    </footer>

</html>
