<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <aside th:replace="~{general/fragmentos :: sidebar}"></aside>

        <main class="main-content">

            <div class="container-fluid">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <div>
                        <h2 class="page-title">Modificar Empresa</h2>
                        <p class="page-subtitle">
                            Actualice la información de la empresa.
                        </p>
                    </div>

                    <a th:href="@{/empresa/listado}"
                       class="btn btn-outline-secondary">

                        <i class="bi bi-arrow-left"></i>
                        Volver

                    </a>

                </div>

                <div class="card shadow-sm">

                    <div class="card-body">

                        <form th:action="@{/empresa/guardar}"
                              method="post"
                              th:object="${empresa}">

                            <input type="hidden"
                                   th:field="*{idEmpresa}">

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Nombre
                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           th:field="*{nombre}"
                                           required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Teléfono
                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           th:field="*{telefono}"
                                           required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Correo Electrónico
                                    </label>

                                    <input type="email"
                                           class="form-control"
                                           th:field="*{correoContacto}"
                                           required>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <label class="form-label">
                                        Estado
                                    </label>

                                    <select class="form-select"
                                            th:field="*{estado}">

                                        <option th:value="true">
                                            Activa
                                        </option>

                                        <option th:value="false">
                                            Inactiva
                                        </option>

                                    </select>

                                </div>

                            </div>

                            <div class="text-end">

                                <a th:href="@{/empresa/listado}"
                                   class="btn btn-secondary">

                                    Cancelar

                                </a>

                                <button type="submit"
                                        class="btn btn-primary">

                                    <i class="bi bi-check-lg"></i>
                                    Guardar cambios

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

        <div th:replace="~{general/fragmentos :: scripts}"></div>

    </body>

</html>
